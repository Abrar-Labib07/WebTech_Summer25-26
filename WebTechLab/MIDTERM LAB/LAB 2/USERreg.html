<!DOCTYPE html>
<html lang="en-US">
<head>
    <title>Bank Account Registration</title>
</head>
<body>
<div class="container">
<form>
    <fieldset>
        <legend>Signup</legend>
        <h2><font color="red">Bank Account Registration</font></h2>
        <table>
            <tr>
                <td>
                    <label for="name">Account Holder Name:</label>
                </td>
                <td>
                    <input type="text" id="name" name="name">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="phone">Account Holder Phone:</label>
                </td>

                <td>
                    <input type="text" id="phone" name="phone">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="email">Account Holder Email:</label>
                </td>
                <td>
                    <input type="email" id="email" name="email">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="address">Account Holder Address:</label>
                </td>
                <td>
                    <textarea id="address" name="address"
                    cols="20" rows="5" style="resize:none">
                    </textarea>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="gender">Account Holder Gender:</label>
                </td>
                <td>
                    <input type="radio" id="male" name="gender" value="Male">
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="Female">
                    <label for="female">Female</label>
                </td>
            </tr>
        </table>
    </fieldset>
    <br>
    <fieldset>
        <legend>Personal Account Info</legend>
        <table>
            <tr>
                <td>
                    <label for="username">User Name:</label>
                </td>
                <td>
                    <input type="text" id="username" name="username">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="password">Password:</label>
                </td>
                <td>
                    <input type="password" id="password" name="password">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="confirmPassword">Confirm Password:</label>
                </td>
                <td>
                    <input type="password" id="confirmPassword" name="confirmPassword">
                </td>
            </tr>
            <tr>
                <td>
                    <input type="submit" value="Sign Up">
                </td>
            </tr>
        </table>
    </fieldset>
</form>
</div>
</body>
</html>
